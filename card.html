<!DOCTYPE html>
<html lang="en">

<head>
    <script src="config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pulse - Virtual Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f0f0f0;
        }

        body.dark-mode .bg-white {
            background: #1e1e2e !important;
            color: #e0e0e0;
        }

        body.dark-mode .text-gray-600,
        body.dark-mode .text-gray-500 {
            color: #a0a0a0 !important;
        }

        /* Card Flip Animation */
        .card-container {
            perspective: 1000px;
            cursor: pointer;
        }

        .card {
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            backface-visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 24px;
        }

        .card-front {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transform: rotateY(0deg);
        }

        .card-back {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            transform: rotateY(180deg);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .float-animation {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }

            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        .card-shine {
            position: relative;
            overflow: hidden;
        }

        .card-shine::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shine 3s infinite;
        }

        /* Loading Animation */
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #667eea;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Pulse Animation for QR */
        @keyframes qrPulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
        }

        .qr-pulse {
            animation: qrPulse 2s ease-in-out infinite;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg sticky top-0 z-50 transition-all duration-300">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center">
                        <span class="text-white font-bold text-xl">P</span>
                    </div>
                    <div>
                        <span
                            class="font-bold text-xl bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">Pulse</span>
                        <span class="text-sm text-gray-500 ml-1">Virtual Card</span>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="text-2xl hover:scale-110 transition-transform">
                        <span id="darkModeIcon">🌙</span>
                    </button>
                    <button onclick="window.location.href='index.html'" class="text-gray-600 hover:text-gray-800">←
                        Back</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8 max-w-2xl">
        <!-- Virtual Card Section -->
        <div class="mb-8">
            <div class="card-container h-64 mb-4" onclick="flipCard()">
                <div class="card relative h-full" id="virtualCard">
                    <!-- Front of Card -->
                    <div class="card-front card-shine p-6 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start">
                                <div class="w-12 h-8 bg-gradient-to-r from-yellow-400 to-orange-500 rounded-lg"></div>
                                <span class="text-xs opacity-75">Virtual Card</span>
                            </div>
                        </div>

                        <div>
                            <div class="text-2xl font-bold tracking-wider mb-3" id="cardNumber">**** **** **** 2024
                            </div>
                            <div class="flex justify-between items-end">
                                <div>
                                    <div class="text-xs opacity-75 mb-1">Card Holder</div>
                                    <div class="font-semibold text-lg" id="studentName">Loading...</div>
                                </div>
                                <div>
                                    <div class="text-xs opacity-75 mb-1">Expires</div>
                                    <div class="font-semibold" id="expiryDate">12/26</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Back of Card -->
                    <div class="card-back p-6 flex flex-col justify-between">
                        <div class="mt-8">
                            <div class="w-full h-10 bg-black opacity-80"></div>
                        </div>
                        <div>
                            <div class="flex justify-between items-center">
                                <div>
                                    <div class="text-xs opacity-75 mb-1">CVV</div>
                                    <div class="font-semibold text-lg" id="cvv">***</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-xs opacity-75 mb-1">Student ID</div>
                                    <div class="font-semibold" id="studentIdBack">---</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <p class="text-center text-sm text-gray-500 mt-2">Tap card to flip ✨</p>
        </div>

        <!-- Balance Card -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
            <div class="text-center">
                <div class="text-gray-500 text-sm mb-1">Available Balance</div>
                <div class="text-5xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent"
                    id="balance">$0.00</div>
            </div>

            <div class="grid grid-cols-2 gap-3 mt-6">
                <button onclick="showTopUp()"
                    class="bg-gradient-to-r from-green-500 to-green-600 text-white py-3 rounded-xl font-semibold hover:shadow-lg transition">
                    💸 Top Up
                </button>
                <button onclick="refreshData()"
                    class="bg-gray-100 text-gray-700 py-3 rounded-xl font-semibold hover:bg-gray-200 transition">
                    🔄 Refresh
                </button>
            </div>
        </div>

        <!-- QR Code Generator -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
            <h3 class="font-bold text-lg mb-4 flex items-center gap-2">
                <span class="text-2xl">📱</span> Generate Payment QR
            </h3>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <input type="number" id="qrAmount" placeholder="Amount ($)"
                    class="p-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                <input type="text" id="qrDesc" placeholder="Description"
                    class="p-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <button onclick="generatePaymentQR()"
                class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white py-3 rounded-xl font-semibold hover:shadow-lg transition">
                Generate QR Code
            </button>

            <div id="qrResult" class="mt-6 text-center hidden">
                <div id="qrCodeImage" class="flex justify-center mb-3 qr-pulse"></div>
                <p class="text-sm text-gray-600">Show this QR code to the vendor</p>
                <p class="text-xs text-red-500 mt-2">⏱️ Expires in 5 minutes</p>
                <button onclick="downloadQR()" class="mt-3 text-indigo-600 text-sm">Download QR</button>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="grid grid-cols-2 gap-4">
            <button onclick="showSendMoney()"
                class="bg-gradient-to-r from-blue-500 to-blue-600 text-white p-4 rounded-xl font-semibold hover:shadow-lg transition">
                💸 Send Money
            </button>
            <button onclick="window.location.href='index.html'"
                class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white p-4 rounded-xl font-semibold hover:shadow-lg transition">
                🛒 Marketplace
            </button>
        </div>
    </div>

    <!-- Modals -->
    <div id="topupModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 transform transition-all">
            <h3 class="text-xl font-bold mb-4">Top Up Wallet</h3>
            <input type="number" id="topupAmount" placeholder="Amount ($)" class="w-full p-3 border rounded-xl mb-4">
            <button onclick="processTopUp()"
                class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-3 rounded-xl font-semibold">Confirm
                Top Up</button>
            <button onclick="closeTopUpModal()" class="w-full mt-2 text-gray-500 py-2">Cancel</button>
        </div>
    </div>

    <div id="sendModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-6">
            <h3 class="text-xl font-bold mb-4">Send Money</h3>
            <input type="text" id="sendTo" placeholder="Recipient Student ID" class="w-full p-3 border rounded-xl mb-3">
            <input type="number" id="sendAmount" placeholder="Amount ($)" class="w-full p-3 border rounded-xl mb-3">
            <input type="text" id="sendDesc" placeholder="Description" class="w-full p-3 border rounded-xl mb-4">
            <button onclick="processSendMoney()"
                class="w-full bg-gradient-to-r from-purple-500 to-indigo-600 text-white py-3 rounded-xl font-semibold">Send
                Money</button>
            <button onclick="closeSendModal()" class="w-full mt-2 text-gray-500 py-2">Cancel</button>
        </div>
    </div>

    <div id="loadingOverlay" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 text-center">
            <div class="loader mx-auto mb-3"></div>
            <p class="text-gray-600">Processing...</p>
        </div>
    </div>

    <script src="network-config.js"></script>
    <script>
        const API = API_URL;
        let currentToken = localStorage.getItem('token');
        let currentUser = JSON.parse(localStorage.getItem('user') || '{}');
        let currentQRData = null;

        // Dark Mode
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
            const icon = document.getElementById('darkModeIcon');
            icon.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        }

        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('darkModeIcon').textContent = '☀️';
        }

        // Flip Card
        function flipCard() {
            const card = document.getElementById('virtualCard');
            card.classList.toggle('flipped');
        }

        async function loadCard() {
            if (!currentToken) {
                window.location.href = 'index.html';
                return;
            }

            // Generate random card details for display
            const cardNum = '**** **** **** ' + Math.floor(Math.random() * 9000 + 1000);
            document.getElementById('cardNumber').innerText = cardNum;
            document.getElementById('studentName').innerText = currentUser.email?.split('@')[0] || 'Student';
            document.getElementById('studentIdBack').innerText = currentUser.studentId || '---';
            document.getElementById('cvv').innerText = Math.floor(Math.random() * 900 + 100);

            const expiry = new Date();
            expiry.setFullYear(expiry.getFullYear() + 2);
            document.getElementById('expiryDate').innerText = `${expiry.getMonth() + 1}/${expiry.getFullYear().toString().slice(-2)}`;

            await loadBalance();
        }

        async function loadBalance() {
            try {
                const res = await fetch(`${API}/wallet/balance`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const data = await res.json();
                document.getElementById('balance').innerText = `$${data.balance.toFixed(2)}`;
            } catch (error) {
                console.error('Error loading balance:', error);
            }
        }

        async function generatePaymentQR() {
            const amount = parseFloat(document.getElementById('qrAmount').value);
            const description = document.getElementById('qrDesc').value || 'Store payment';

            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            showLoading(true);

            try {
                const res = await fetch(`${API}/qr/generate`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ amount, description })
                });

                if (res.ok) {
                    const data = await res.json();
                    currentQRData = data.paymentData;

                    const qrDiv = document.getElementById('qrCodeImage');
                    qrDiv.innerHTML = '';

                    new QRCode(qrDiv, {
                        text: JSON.stringify(data.paymentData),
                        width: 200,
                        height: 200
                    });

                    document.getElementById('qrResult').classList.remove('hidden');
                    document.getElementById('qrAmount').value = '';
                    document.getElementById('qrDesc').value = '';

                    // Auto-hide after 5 minutes
                    setTimeout(() => {
                        document.getElementById('qrResult').classList.add('hidden');
                    }, 300000);
                } else {
                    alert('Failed to generate QR code');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }

            showLoading(false);
        }

        function downloadQR() {
            const qrImage = document.querySelector('#qrCodeImage img');
            if (qrImage) {
                const link = document.createElement('a');
                link.download = 'pulse-qr.png';
                link.href = qrImage.src;
                link.click();
            }
        }

        async function processTopUp() {
            const amount = parseFloat(document.getElementById('topupAmount').value);

            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            showLoading(true);

            const res = await fetch(`${API}/wallet/topup`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${currentToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ amount, description: 'Virtual card top-up' })
            });

            if (res.ok) {
                alert(`✅ Added $${amount.toFixed(2)} to your wallet`);
                closeTopUpModal();
                loadBalance();
            } else {
                alert('Top-up failed');
            }

            showLoading(false);
        }

        async function processSendMoney() {
            const toStudentId = document.getElementById('sendTo').value;
            const amount = parseFloat(document.getElementById('sendAmount').value);
            const description = document.getElementById('sendDesc').value;

            if (!toStudentId || !amount) {
                alert('Please fill all fields');
                return;
            }

            showLoading(true);

            const res = await fetch(`${API}/wallet/transfer`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${currentToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ toStudentId, amount, description })
            });

            if (res.ok) {
                alert(`✅ Sent $${amount.toFixed(2)} to ${toStudentId}`);
                closeSendModal();
                loadBalance();
            } else {
                const error = await res.json();
                alert('Failed: ' + error.error);
            }

            showLoading(false);
        }

        function refreshData() {
            loadBalance();
        }

        function showTopUp() {
            document.getElementById('topupModal').classList.remove('hidden');
        }

        function closeTopUpModal() {
            document.getElementById('topupModal').classList.add('hidden');
            document.getElementById('topupAmount').value = '';
        }

        function showSendMoney() {
            document.getElementById('sendModal').classList.remove('hidden');
        }

        function closeSendModal() {
            document.getElementById('sendModal').classList.add('hidden');
            document.getElementById('sendTo').value = '';
            document.getElementById('sendAmount').value = '';
            document.getElementById('sendDesc').value = '';
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
        }

        loadCard();
    </script>
</body>

</html>
