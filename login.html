<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div
                class="w-20 h-20 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="text-white text-3xl font-bold">P</span>
            </div>
            <h1 class="text-2xl font-bold">Pulse Login</h1>
            <p class="text-gray-500 text-sm">Digital Campus Wallet</p>
        </div>

        <div class="mb-4">
            <input type="email" id="email" placeholder="Email Address" class="w-full p-3 border rounded-xl">
        </div>

        <div class="mb-6">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-xl">
        </div>

        <button onclick="login()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">
            Login
        </button>

        <div class="text-center mt-6">
            <a href="register.html" class="text-indigo-600">Don't have an account? Register</a>
        </div>
    </div>

    <script>
        // USE LOCALHOST FOR LOCAL TESTING
        const API_URL = 'http://localhost:3000/api';

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }

            console.log('Logging in with:', email);
            console.log('API URL:', API_URL);

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    alert('Login successful!');

                    if (data.user.role === 'admin') {
                        window.location.href = 'admin/index.html';
                    } else if (data.user.role === 'vendor') {
                        window.location.href = 'pos/index.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    alert('Login failed: ' + (data.error || 'Wrong email or password'));
                }
            } catch (error) {
                console.error('Fetch error:', error);
                alert('Cannot connect to server. Make sure backend is running on port 3000');
            }
        }

        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>

</html>
