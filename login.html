<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <script>
        // Now you can use API_URL
        fetch(`${API_URL}/auth/login`, );
    </script>
</head>

<body class="bg-gradient-to-r from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div
                class="w-20 h-20 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="text-white text-3xl font-bold">P</span>
            </div>
            <h1 class="text-2xl font-bold">Welcome to Pulse</h1>
            <p class="text-gray-500 text-sm">Digital Campus Wallet</p>
        </div>

        <div class="mb-4">
            <input type="email" id="loginEmail" placeholder="Email Address" class="w-full p-3 border rounded-xl">
        </div>

        <div class="mb-6">
            <input type="password" id="loginPassword" placeholder="Password" class="w-full p-3 border rounded-xl">
        </div>

        <button onclick="login()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold">
            Login
        </button>

        <div class="text-center mt-6">
            <a href="register.html" class="text-indigo-600">Don't have an account? Register</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://pulse-api-e30b.onrender.com/api';

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    alert('Login successful!');

                    if (data.user.role === 'admin') {
                        window.location.href = 'admin/index.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    alert('Login failed: ' + (data.error || 'Invalid credentials'));
                }
            } catch (error) {
                alert('Network error. Backend waking up? Try again.');
            }
        }
    </script>
</body>

</html>
