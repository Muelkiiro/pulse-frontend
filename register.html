<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div
                class="w-20 h-20 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="text-white text-3xl font-bold">P</span>
            </div>
            <h1 class="text-2xl font-bold">Create Account</h1>
            <p class="text-gray-500 text-sm">Join Pulse Digital Wallet</p>
        </div>

        <div class="mb-4">
            <input type="text" id="regName" placeholder="Full Name" class="w-full p-3 border rounded-xl">
        </div>
        <div class="mb-4">
            <input type="email" id="regEmail" placeholder="Email Address" class="w-full p-3 border rounded-xl">
        </div>
        <div class="mb-4">
            <input type="text" id="regStudentId" placeholder="Student ID" class="w-full p-3 border rounded-xl">
        </div>
        <div class="mb-6">
            <input type="password" id="regPassword" placeholder="Password" class="w-full p-3 border rounded-xl">
        </div>

        <button onclick="register()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">
            Create Account
        </button>

        <div class="text-center mt-6">
            <a href="login.html" class="text-indigo-600">Already have an account? Login</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const studentId = document.getElementById('regStudentId').value;
            const password = document.getElementById('regPassword').value;

            if (!name || !email || !studentId || !password) {
                alert('Please fill all fields');
                return;
            }

            if (password.length < 4) {
                alert('Password must be at least 4 characters');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        studentId: studentId,
                        password: password,
                        role: 'student'
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Registration successful! Please login.');
                    window.location.href = 'login.html';
                } else {
                    alert('Registration failed: ' + (data.error || 'Try different email/student ID'));
                }
            } catch (error) {
                alert('Error: ' + error.message + '\n\nMake sure backend is running on port 3000');
            }
        }
    </script>
</body>

</html>
