<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pulse - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .register-card {
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="flex items-center justify-center p-4">
    <div class="register-card bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div
                class="w-20 h-20 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="text-white text-3xl font-bold">P</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Create Account</h1>
            <p class="text-gray-500 text-sm mt-1">Join Pulse Digital Wallet</p>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Full Name</label>
            <input type="text" id="regName" placeholder="John Doe"
                class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
            <input type="email" id="regEmail" placeholder="student@school.com"
                class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Student ID</label>
            <input type="text" id="regStudentId" placeholder="e.g., STU001"
                class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <div class="mb-6">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
            <input type="password" id="regPassword" placeholder="Create a password"
                class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <button onclick="register()"
            class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 rounded-xl font-semibold hover:shadow-lg transition">
            Create Account
        </button>

        <div class="text-center mt-6">
            <p class="text-sm text-gray-600">Already have an account? <a href="login.html"
                    class="text-indigo-600 font-semibold">Login</a></p>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const studentId = document.getElementById('regStudentId').value;
            const password = document.getElementById('regPassword').value;

            if (!name || !email || !studentId || !password) {
                alert('Please fill all fields');
                return;
            }

            if (password.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, studentId, password, role: 'student' })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Registration successful! Please login.');
                    window.location.href = 'login.html';
                } else {
                    alert('Registration failed: ' + (data.error || 'Try different email/student ID'));
                }
            } catch (error) {
                alert('Network error. Backend may be waking up. Try again in 30 seconds.');
            }
        }
    </script>
</body>

</html>
