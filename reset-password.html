<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Pulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div
                class="w-20 h-20 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <span class="text-white text-3xl font-bold">P</span>
            </div>
            <h1 class="text-2xl font-bold">Reset Password</h1>
            <p class="text-gray-500 text-sm">Enter your new password</p>
        </div>

        <div id="resetForm">
            <input type="password" id="newPassword" placeholder="New Password"
                class="w-full p-3 border rounded-xl mb-3">
            <input type="password" id="confirmPassword" placeholder="Confirm Password"
                class="w-full p-3 border rounded-xl mb-4">
            <button onclick="resetPassword()"
                class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold">Reset Password</button>
        </div>

        <div class="text-center mt-6">
            <a href="login.html" class="text-indigo-600">Back to Login</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://pulse-api-e30b.onrender.com/api';
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('resetForm').innerHTML = '<p class="text-red-500 text-center">Invalid or missing reset token.</p>';
        }

        async function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!newPassword || !confirmPassword) {
                alert('Please fill all fields');
                return;
            }

            if (newPassword !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            if (newPassword.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                if (response.ok) {
                    alert('Password reset successful! Please login.');
                    window.location.href = 'login.html';
                } else {
                    const error = await response.json();
                    alert('Reset failed: ' + error.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
    </script>
</body>

</html>
