<!DOCTYPE html>
<html lang="en">

<head>
    <script src="config.js"></script>
    <script src="network-config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pulse Virtual Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .card-preview {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 20px;
            color: white;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .card-preview:hover {
            transform: translateY(-5px);
        }

        .chip {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            width: 45px;
            height: 35px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .pulse-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>

<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md">
            <!-- Virtual Card -->
            <div class="card-preview mb-6" id="virtualCard">
                <div class="chip"></div>
                <div class="text-xl font-bold tracking-wider mb-2" id="cardNumber">•••• •••• •••• 2024</div>
                <div class="flex justify-between items-end">
                    <div>
                        <div class="text-xs opacity-75">Card Holder</div>
                        <div class="font-semibold" id="studentName">Loading...</div>
                    </div>
                    <div>
                        <div class="text-xs opacity-75">Student ID</div>
                        <div class="font-semibold" id="studentId">---</div>
                    </div>
                </div>
            </div>

            <!-- Balance Display -->
            <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
                <div class="text-center">
                    <div class="text-gray-500 text-sm mb-1">Available Balance</div>
                    <div class="text-4xl font-bold text-gray-800" id="balance">$0.00</div>
                </div>

                <div class="grid grid-cols-2 gap-3 mt-4">
                    <button onclick="showTopUp()" class="bg-green-500 text-white py-2 rounded-lg font-semibold">💸 Top
                        Up</button>
                    <button onclick="refreshCard()" class="bg-blue-500 text-white py-2 rounded-lg font-semibold">🔄
                        Refresh</button>
                </div>
            </div>

            <!-- QR Code for Payment -->
            <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
                <div class="text-center">
                    <div class="text-gray-500 text-sm mb-2">Generate Payment QR</div>
                    <div class="flex gap-2 mb-4">
                        <input type="number" id="qrAmount" placeholder="Amount" class="flex-1 p-2 border rounded">
                        <input type="text" id="qrDesc" placeholder="Description" class="flex-1 p-2 border rounded">
                        <button onclick="generatePaymentQR()"
                            class="bg-purple-500 text-white px-4 py-2 rounded">Generate</button>
                    </div>
                    <div id="qrContainer" class="hidden">
                        <div id="qrCodeImage" class="flex justify-center mb-2"></div>
                        <p class="text-sm text-gray-500">Show this QR to vendor</p>
                        <p class="text-xs text-red-500 mt-1">Expires in 5 minutes</p>
                    </div>
                </div>
            </div>

            <!-- Recent Transactions -->
            <div class="bg-white rounded-xl shadow-lg p-6">
                <h3 class="font-bold text-gray-800 mb-3">Recent Transactions</h3>
                <div id="transactionsList" class="space-y-2 max-h-64 overflow-y-auto">
                    <p class="text-gray-500 text-center">Loading...</p>
                </div>
            </div>

            <!-- Top Up Modal -->
            <div id="topupModal"
                class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                <div class="bg-white rounded-lg p-6 w-80">
                    <h3 class="font-bold mb-3">Top Up Wallet</h3>
                    <input type="number" id="topupAmount" placeholder="Amount ($)"
                        class="w-full p-2 border rounded mb-3">
                    <button onclick="topUp()" class="w-full bg-green-600 text-white py-2 rounded">Confirm</button>
                    <button onclick="closeTopUpModal()" class="w-full mt-2 text-gray-500">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        const API = API_URL;
        let currentToken = localStorage.getItem('token');
        let currentUser = JSON.parse(localStorage.getItem('user') || '{}');

        async function loadCard() {
            if (!currentToken) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('studentName').innerText = currentUser.email?.split('@')[0] || 'Student';
            document.getElementById('studentId').innerText = currentUser.studentId || '---';

            await loadBalance();
            await loadTransactions();
        }

        async function loadBalance() {
            const res = await fetch(`${API}/wallet/balance`, {
                headers: { 'Authorization': `Bearer ${currentToken}` }
            });
            const data = await res.json();
            document.getElementById('balance').innerText = `$${data.balance.toFixed(2)}`;
        }

        async function loadTransactions() {
            const res = await fetch(`${API}/wallet/transactions`, {
                headers: { 'Authorization': `Bearer ${currentToken}` }
            });
            const transactions = await res.json();

            const container = document.getElementById('transactionsList');
            if (transactions.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center">No transactions yet</p>';
                return;
            }

            container.innerHTML = transactions.slice(0, 10).map(t => `
                <div class="flex justify-between items-center border-b pb-2">
                    <div>
                        <p class="text-sm font-medium">${t.type}</p>
                        <p class="text-xs text-gray-500">${new Date(t.timestamp).toLocaleString()}</p>
                    </div>
                    <p class="${t.amount > 0 ? 'text-green-600' : 'text-red-600'} font-bold">
                        ${t.amount > 0 ? '+' : ''}$${Math.abs(t.amount).toFixed(2)}
                    </p>
                </div>
            `).join('');
        }

        async function generatePaymentQR() {
            const amount = parseFloat(document.getElementById('qrAmount').value);
            const description = document.getElementById('qrDesc').value || 'Store payment';

            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            const res = await fetch(`${API}/qr/generate`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${currentToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ amount, description })
            });

            if (res.ok) {
                const data = await res.json();

                // Display QR code
                const container = document.getElementById('qrContainer');
                const qrDiv = document.getElementById('qrCodeImage');
                qrDiv.innerHTML = '';
                new QRCode(qrDiv, {
                    text: JSON.stringify(data.paymentData),
                    width: 200,
                    height: 200
                });
                container.classList.remove('hidden');

                // Auto-hide after 5 minutes
                setTimeout(() => {
                    container.classList.add('hidden');
                }, 300000);
            } else {
                alert('Failed to generate QR code');
            }
        }

        function showTopUp() {
            document.getElementById('topupModal').classList.remove('hidden');
        }

        function closeTopUpModal() {
            document.getElementById('topupModal').classList.add('hidden');
            document.getElementById('topupAmount').value = '';
        }

        async function topUp() {
            const amount = parseFloat(document.getElementById('topupAmount').value);

            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            const res = await fetch(`${API}/wallet/topup`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${currentToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ amount, description: 'Virtual card top-up' })
            });

            if (res.ok) {
                alert('Top-up successful!');
                closeTopUpModal();
                loadBalance();
                loadTransactions();
            } else {
                alert('Top-up failed');
            }
        }

        function refreshCard() {
            loadBalance();
            loadTransactions();
        }

        // Check for existing session
        if (!currentToken) {
            window.location.href = 'index.html';
        } else {
            loadCard();
        }
    </script>
</body>

</html>
